[build]
  command = "bash scripts/build-netlify.sh"
  publish = "build/web"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/gemini to the serverless function
[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/gemini"
  status = 200

# Proxy /api/whereami to the RapidAPI serverless function
[[redirects]]
  from = "/api/whereami"
  to = "/.netlify/functions/whereami"
  status = 200

# Proxy /api/narration to the Kimi K2.6 serverless function
[[redirects]]
  from = "/api/narration"
  to = "/.netlify/functions/narration"
  status = 200

# SPA redirect: all other routes serve index.html (Flutter web is a single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Prevent caching of index.html so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Flutter web does NOT content-hash main.dart.js, so it must revalidate on every request.
# Caching it immutably would serve stale JS from a previous deploy.
[[headers]]
  for = "/main.dart.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# flutter_bootstrap.js and flutter.js are also unhashed and change between builds
[[headers]]
  for = "/flutter_bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/flutter.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Cache CanvasKit WASM assets (content-hashed by Flutter engine revision)
[[headers]]
  for = "/canvaskit/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

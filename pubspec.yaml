name: iris
description: "Computer Vision based campus Navigation app for visually impaired people."
 
publish_to: 'none'  
 
version: 1.0.0+1

environment:
  sdk: ^3.11.5

 
dependencies:
  flutter:
    sdk: flutter

  provider:
  google_fonts:
  web:


  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  hive_ce: ^2.19.3
  uuid: ^4.5.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0
 

 
flutter:
 
  uses-material-design: true

  assets:
    - assets/audio/

